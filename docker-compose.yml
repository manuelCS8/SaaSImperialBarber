services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-imperial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imperial
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_imperial_barber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imperial -d saas_imperial_barber"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
