databases:
  - name: imperial-barber-db
    plan: free
    databaseName: saas_imperial_barber
    user: imperial_user

services:
  - type: web
    name: saas-imperial-barber-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push && npx prisma db seed
    startCommand: node dist/index.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: imperial-barber-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://imperial-barber-tau.vercel.app
